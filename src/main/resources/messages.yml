# SolarityChat Messages Configuration
# You can use Legacy (&) or MiniMessage (<color>) formatting.
# MiniMessage Guide: https://docs.advntr.dev/minimessage/format.html

plugin-prefix: "<dark_gray>[<gradient:#FFD700:#FFA500>SolarityChat</gradient>]<reset> "

no-permission: "%prefix%<red>You do not have permission to do this."
command-usage: "%prefix%<red>Usage: /solaritychat <reload|test|toggle-alerts|warnings|setwarnings|clearwarnings>"
reload-success: "%prefix%<green>Configuration files reloaded successfully."
player-not-found: "%prefix%<red>Could not find that player."

chat-cooldown: "%prefix%<red>Please wait <yellow>%time%</yellow> seconds before chatting again."
staff-alert: "<dark_gray>[<red>ALERT<dark_gray>] <gray>%player% <white>triggered <red>%filter_name%<white>: <gray>%message%"
player-violation: "%prefix%<red>Your message was not sent. Please review our server rules."

warnings-check: "%prefix%<yellow>%player% <white>has <red>%warnings% <white>warnings."
warnings-set: "%prefix%<white>Set <yellow>%player%<white>'s warnings to <red>%warnings%<white>."
warnings-cleared: "%prefix%<white>Cleared <yellow>%player%<white>'s warnings."

alerts-enabled: "%prefix%<green>Staff alerts enabled."
alerts-disabled: "%prefix%<red>Staff alerts disabled."

test-triggered: "%prefix%<red>Would trigger filter: <yellow>%filter_name%"
test-passed: "%prefix%<green>Message passed all filters."

tag-selected: "%prefix%<green>You selected the tag: "
tag-reset: "%prefix%<green>Your tag has been reset."
no-tag-permission: "%prefix%<red>You don't have permission to use this tag."

chatMotd:
  - "<gradient:#49C4FF:#08B6FB><bold>WELCOME</bold></gradient> <white>to <gradient:#49C4FF:#08B6FB><underlined>SolarityMC</underlined></gradient>!"
  - " <white>→ <gray>(Generators)"
  - ""
  - " <dark_gray>⬛ <white>This is <gradient:#49C4FF:#08B6FB><underlined>Season 1</underlined></gradient>"
  - " <dark_gray>⬛ <white>Type <yellow>/tutorial</yellow> for help!"
  - ""
  - " <gray><underlined>play.solaritymc.net</underlined>"

# Update Notifications
update-notifier:
  - "<yellow>⚠</yellow> <yellow><bold>Update Available!</bold></yellow>"
  - "<gray>A new version of <gradient:#FFD700:#FFA500>SolarityChat</gradient> is available!</gray>"
  - "<gray>Current: </gray><red><current></red> <gray>→ New: </gray><green><new></green>"
  - "<aqua><u>Click here to download the update</u></aqua>"
