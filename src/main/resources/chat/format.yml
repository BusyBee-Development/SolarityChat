enabled: true

default-format: "default"

formats:
  default:
    priority: 0
    permission: ""
    
    prefix:
      text: '%luckperms_prefix%'
      hover:
        - '<gradient:#08B6FB:#ADF3FD><bold>PLAYER PROFILE</bold></gradient>'
        - '<dark_gray>%player_name%'
        - ''
        - '<gradient:#08B6FB:#ADF3FD>| </gradient><white>Kills: <aqua>%statistic_player_kills%'
        - '<gradient:#08B6FB:#ADF3FD>| </gradient><white>Deaths: <aqua>%statistic_deaths%'
        - '<gradient:#08B6FB:#ADF3FD>| </gradient><white>Balance: <green>$%vault_eco_balance%'
        - '<gradient:#08B6FB:#ADF3FD>| </gradient><white>Playtime: <aqua>%statistic_time_played%'
    
    name:
      text: '<white>%displayname%'
      hover:
        - '<gradient:#08B6FB:#ADF3FD><bold>%player_name%</bold></gradient>'
        - '<gray>Click to message this player'
      click: 'SUGGEST_COMMAND:/msg %player_name% '
    
    suffix:
      text: '%luckperms_suffix% %tag%'
    
    message:
      text: '<dark_gray>:</dark_gray> %message%'

formatting:
  allow-color-codes: true
  allow-hex-colors: true
  strip-colors-without-permission: true
  
  color-permissions:
    enabled: true
    require-permission: "solaritychat.format.color"
  
  hex-permissions:
    enabled: true
    require-permission: "solaritychat.format.hex"
  
  format-permissions:
    bold: "solaritychat.format.bold"
    italic: "solaritychat.format.italic"
    underline: "solaritychat.format.underline"
    strikethrough: "solaritychat.format.strikethrough"
    magic: "solaritychat.format.magic"