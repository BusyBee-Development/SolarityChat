# ======================================================
# SolarityChat - Main Configuration
# Developed by: BusyBee (djtmk)
# 
# This file contains the main settings for the plugin.
# Most chat-specific settings (formats, channels, etc.) 
# are located in the 'chat/' folder.
# ======================================================

# ------------------------------------------------------
# Chat Settings
# ------------------------------------------------------
chat:
  # The cooldown between chat messages in seconds.
  # Set to 0 to allow players to chat as fast as they want.
  # Bypass permission: solaritychat.bypass.cooldown
  cooldown: 0

  # Settings for when a player is mentioned in chat.
  mention:
    # Whether player mentions should be highlighted and play a sound.
    enabled: true
    
    # The character(s) that must precede a name for it to be a mention.
    # If set to "@", a player must type "@Username".
    # If empty (""), just typing "Username" will trigger the mention.
    char: ""
    
    # How the mention should appear for the recipient.
    # %player_name% will be replaced with the name of the mentioned player.
    # Supports MiniMessage: https://docs.advntr.dev/minimessage/format.html
    replacement: "<yellow>@%player_name%</yellow>"
    
    # Sound played to the player when they are mentioned.
    sound:
      # Minecraft sound name.
      # List: https://jd.papermc.io/paper/1.20/org/bukkit/Sound.html
      name: "BLOCK_NOTE_BLOCK_PLING"
      
      # Volume (0.0 to 1.0)
      volume: 1.0
      
      # Pitch (0.5 to 2.0)
      pitch: 1.0

# ------------------------------------------------------
# Discord Integration
# ------------------------------------------------------
discord:
  # The Discord Webhook URL used for notifications and filter alerts.
  # To use this, add the "DISCORD_WEBHOOK" action to a filter in filters.yml.
  webhook-url: ""
  
  # Configuration for the embed message sent to Discord.
  embed:
    # Title of the embed. Supports: %action_type%
    title: "%action_type%"
    
    # Sidebar color of the embed (Hex code).
    color: "#3498db"
    
    # Main content of the embed. 
    # Supports: %player%, %action_verb%, %message%
    description: "%player% has been %action_verb% because they said `%message%`"
    
    # Text shown at the bottom of the embed.
    footer: "If this is false, un%action_verb% them."
    
    # Time format shown in the embed.
    # Uses Java DateTimeFormatter patterns.
    timestamp-format: "M/d/yy, h:mm a"

# ------------------------------------------------------
# Grammar Correction
# ------------------------------------------------------
grammar:
  # Automatically capitalize the first letter of messages.
  # Bypass permission: solaritychat.grammar.bypass
  auto-capitalize: true
  
  # Automatically add a period at the end of messages.
  # Bypass permission: solaritychat.grammar.bypass
  auto-punctuate: true
  
  # Minimum message length for grammar corrections to apply.
  min-length: 5

# ------------------------------------------------------
# Chat Channels
# ------------------------------------------------------
channels:
  # Whether the channel system is enabled.
  # If disabled, channel prefixes and commands will be inactive.
  enabled: false

# ------------------------------------------------------
# Warning System
# ------------------------------------------------------
warnings:
  # Whether player warnings should be saved and persist after a player leaves.
  # If false, warnings are not saved to the database.
  persistent: false